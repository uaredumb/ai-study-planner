<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Lumi Pricing</title>
  <meta name="robots" content="noindex" />
  <!-- Pricing now lives on the main site with secure Clerk checkout. Send everyone there. -->
  <meta http-equiv="refresh" content="0; url=index.html#buy" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=20260304" />
  <link rel="apple-touch-icon" sizes="180x180" href="LumiStudy logo with glowing orb (1).png?v=20260313" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { color-scheme: light dark; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: "Outfit", ui-sans-serif, system-ui, sans-serif;
      background: #f8fafc; color: #0f172a;
      display: grid; place-items: center; text-align: center; padding: 24px;
    }
    @media (prefers-color-scheme: dark) { body { background: #020617; color: #e2e8f0; } }
    .logo { height: 56px; width: 56px; border-radius: 16px; object-fit: cover; box-shadow: 0 10px 30px rgba(99,102,241,.25); }
    h1 { font-size: 1.25rem; font-weight: 800; margin: 18px 0 6px; }
    p { margin: 0 0 18px; color: #64748b; }
    @media (prefers-color-scheme: dark) { p { color: #94a3b8; } }
    a.btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 20px; border-radius: 12px; font-weight: 700; text-decoration: none;
      color: #fff; background: #6366f1;
    }
    a.btn:hover { background: #4f46e5; }
    .spin { height: 26px; width: 26px; border-radius: 9999px; border: 3px solid #6366f1; border-top-color: transparent; animation: s 0.8s linear infinite; }
    @keyframes s { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div>
    <img class="logo" src="LumiStudy logo with glowing orb (1).png?v=20260313" alt="Lumi" />
    <h1>Taking you to pricing…</h1>
    <p>Secure checkout opens on the main site.</p>
    <div class="spin" role="status" aria-label="Loading" style="margin: 0 auto 18px;"></div>
    <a class="btn" href="index.html#buy">Continue to plans &rarr;</a>
  </div>
  <script>
    // Belt-and-suspenders: redirect immediately even if the meta refresh is blocked.
    try { location.replace("index.html#buy"); } catch (e) { location.href = "index.html#buy"; }
  </script>
</body>
</html>
